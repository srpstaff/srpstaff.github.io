<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SRP Staff & HR Handbook</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Staff and HR policies for our ER:LC server.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- Default Docsify Theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <!-- Dark Mode Theme CSS -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-dark-mode@0.6.1/dist/style.css"/>
</head>
<body>
  <div id="app">Loading handbook...</div>
  <script>
    window.$docsify = {
      name: 'SRP Handbook',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      search: 'auto',
      // Dark Mode Configuration (Defaults to dark mode)
      darkMode: {
        dark: {
          background: '#1a1a1a',
          toggleBtnBg: '#333',
          textColor: '#b4b4b4'
        },
        light: {
          background: 'white',
          toggleBtnBg: 'var(--theme-color)',
          textColor: '#34495e'
        },
        default: 'dark' // Sets dark mode as the default
      }
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <!-- Dark Mode Plugin Script -->
  <script src="//cdn.jsdelivr.net/npm/docsify-dark-mode@0.6.1/dist/index.js"></script>
</body>
</html>
